<!DOCTYPE html>
<html>
<head>
    <title>SSAP App Fetcher</title>
    <script src="webOSTV.js"></script>
    <style>
        body { background: #000; color: #fff; font-family: sans-serif; }
        .app-container { display: flex; flex-wrap: wrap; gap: 15px; padding: 20px; }
        .app-item { 
            width: 120px; text-align: center; border: 1px solid #444; 
            padding: 10px; border-radius: 8px; cursor: pointer;
        }
        .app-item:active { background: #333; }
        .icon { width: 80px; height: 80px; display: block; margin: 0 auto 10px; }
        .name { font-size: 12px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    </style>
</head>
<body>

    <h1>SSAP Application List</h1>
    <div id="app-list" class="app-container">Fetching...</div>

    <script>
        function loadApps() {
            const container = document.getElementById('app-list');

            // Using the ssap:// protocol specifically
            webOS.service.request("ssap://com.webos.applicationManager", {
                method: "listApps",
                parameters: {},
                onSuccess: function (res) {
                    container.innerHTML = "";
                    res.apps.forEach(app => {
                        const div = document.createElement('div');
                        div.className = 'app-item';
                        
                        // SSAP responses typically include 'icon' or 'largeIcon'
                        const iconUrl = app.largeIcon || app.icon || 'default.png';
                        
                        div.innerHTML = `
                            <img src="${iconUrl}" class="icon">
                            <div class="name">${app.title}</div>
                        `;
                        
                        div.onclick = function() { launch(app.id); };
                        container.appendChild(div);
                    });
                },
                onFailure: function (err) {
                    container.innerHTML = "Error: " + JSON.stringify(err);
                }
            });
        }

        function launch(id) {
            webOS.service.request("ssap://com.webos.applicationManager", {
                method: "launch",
                parameters: { id: id },
                onSuccess: function() { console.log("Launched " + id); },
                onFailure: function(e) { alert("Launch failed: " + e.errorText); }
            });
        }

        window.onload = loadApps;
    </script>
</body>
</html>
        .app-icon {
            width: 80px;
            height: 80px;
            margin-bottom: 10px;
            border-radius: 15px;
            object-fit: contain;
        }
        .app-title {
            font-size: 14px;
            font-weight: bold;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }
    </style>
</head>
<body>

    <h2>Installed Applications</h2>
    <div id="app-list">Loading apps...</div>

    <script>
        // 1. Fetch the list of apps
        function fetchApps() {
            const appListContainer = document.getElementById('app-list');

            webOS.service.request("luna://com.webos.applicationManager", {
                method: "listApps",
                parameters: { },
                onSuccess: function (response) {
                    if (response.apps && response.apps.length > 0) {
                        renderApps(response.apps);
                    } else {
                        appListContainer.innerHTML = "No apps found.";
                    }
                },
                onFailure: function (error) {
                    console.error("Failed to fetch apps:", error);
                    appListContainer.innerHTML = "Error fetching apps. Is this a webOS device?";
                }
            });
        }

        // 2. Render apps to the screen
        function renderApps(apps) {
            const appListContainer = document.getElementById('app-list');
            appListContainer.innerHTML = ''; // Clear loading text

            apps.forEach(app => {
                const card = document.createElement('div');
                card.className = 'app-card';
                
                // Use the icon path from the JSON response
                // WebOS usually provides 'icon' as a relative path or 'iconPath' as absolute
                const iconSrc = app.icon || app.iconPath || 'default-icon.png';
                
                card.innerHTML = `
                    <img src="${iconSrc}" class="app-icon" alt="${app.title}">
                    <div class="app-title">${app.title}</div>
                `;

                card.addEventListener('click', () => launchApp(app.id));
                appListContainer.appendChild(card);
            });
        }

        // 3. Launch the selected app
        function launchApp(appId) {
            console.log("Launching: " + appId);
            webOS.service.request("luna://com.webos.applicationManager", {
                method: "launch",
                parameters: { id: appId },
                onSuccess: function (response) {
                    console.log("App launched successfully");
                },
                onFailure: function (error) {
                    alert("Failed to launch app: " + error.errorText);
                }
            });
        }

        // Initial fetch on load
        window.onload = fetchApps;
    </script>
</body>
</html>
